<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D Ground Triple Sticks + Gizmo Editor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
      touch-action: none;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      touch-action: none;
    }

    #topbar {
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      z-index: 30;
      pointer-events: none;
    }

    #leftMenu {
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    .uiButton {
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 6px 10px;
      border-radius: 9px;
      font-size: 11px;
      touch-action: manipulation;
      user-select: none;
      text-align: left;
    }

    .uiButton:active {
      background: rgba(255,255,255,0.15);
    }

    .uiButton:disabled {
      opacity: 0.45;
    }

    #info {
      position: absolute;
      top: 52px;
      left: 8px;
      color: white;
      font-size: 11px;
      line-height: 1.45;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      border-radius: 8px;
      user-select: none;
      z-index: 10;
      max-width: 78vw;
      display: none;
      white-space: pre-line;
    }

    #editorPanel {
      position: absolute;
      top: 52px;
      right: 8px;
      width: 206px;
      max-width: 60vw;
      color: white;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px;
      z-index: 25;
      display: none;
      pointer-events: auto;
    }

    #editorPanel h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 600;
    }

    #editorPanel .sectionTitle {
      font-size: 11px;
      opacity: 0.8;
      margin: 10px 0 6px 0;
    }

    #editorPanel .buttonCol {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #editorStatus {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.4;
      opacity: 0.95;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="topbar">
    <div id="leftMenu">
      <button id="toggleInfoButton" class="uiButton">操作説明: OFF</button>
      <button id="toggleEditorButton" class="uiButton">人形作成: ON</button>
      <button id="toggleEditorPanelButton" class="uiButton">編集パネル: ON</button>
    </div>

    <button id="resetButton" class="uiButton">RESET</button>
  </div>

  <div id="info">
PC:
↑↓ 前後 / ←→ 左右平行 / A D 回転 / W S 見上げ見下ろし / Q E 上下 / R リセット

スマホ:
左下 下スティック = 地面平行移動
左下 上スティック = 画面基準の上下左右移動
右スティック = 通常カメラ回転

エディタ:
点や関節を追加すると仮配置モードに入る
決定で配置確定 / キャンセルで取消
軸ギズモは先端だけでなく線でも掴める
平面拘束ONなら基本は中心平面 x=0 上
平面離脱でX方向移動を許可
対称モードONなら反対側にも自動生成
  </div>

  <div id="editorPanel">
    <h3>人形作成</h3>

    <div class="sectionTitle">ノード追加</div>
    <div class="buttonCol">
      <button id="addJoint1Button" class="uiButton">1自由度関節追加</button>
      <button id="addJoint2Button" class="uiButton">2自由度関節追加</button>
      <button id="addJoint3Button" class="uiButton">3自由度関節追加</button>
      <button id="addPointButton" class="uiButton">点追加</button>
    </div>

    <div class="sectionTitle">編集</div>
    <div class="buttonCol">
      <button id="connectButton" class="uiButton">接続</button>
      <button id="disconnectButton" class="uiButton">接続削除</button>
      <button id="toggleMoveModeButton" class="uiButton">移動モード: OFF</button>
      <button id="toggleSymmetryButton" class="uiButton">対称モード: OFF</button>
      <button id="toggleMirrorPlaneButton" class="uiButton">対称平面表示: ON</button>
      <button id="togglePlaneConstraintButton" class="uiButton">平面拘束: ON</button>
      <button id="releasePlaneButton" class="uiButton">平面離脱</button>
      <button id="confirmPlacementButton" class="uiButton">決定</button>
      <button id="cancelPlacementButton" class="uiButton">キャンセル</button>
      <button id="clearSelectionButton" class="uiButton">選択解除</button>
      <button id="deleteSelectedButton" class="uiButton">選択削除</button>
    </div>

    <div id="editorStatus"></div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const resetButton = document.getElementById("resetButton");
    const toggleInfoButton = document.getElementById("toggleInfoButton");
    const toggleEditorButton = document.getElementById("toggleEditorButton");
    const toggleEditorPanelButton = document.getElementById("toggleEditorPanelButton");
    const infoPanel = document.getElementById("info");
    const editorPanel = document.getElementById("editorPanel");

    const addJoint1Button = document.getElementById("addJoint1Button");
    const addJoint2Button = document.getElementById("addJoint2Button");
    const addJoint3Button = document.getElementById("addJoint3Button");
    const addPointButton = document.getElementById("addPointButton");
    const connectButton = document.getElementById("connectButton");
    const disconnectButton = document.getElementById("disconnectButton");
    const toggleMoveModeButton = document.getElementById("toggleMoveModeButton");
    const toggleSymmetryButton = document.getElementById("toggleSymmetryButton");
    const toggleMirrorPlaneButton = document.getElementById("toggleMirrorPlaneButton");
    const togglePlaneConstraintButton = document.getElementById("togglePlaneConstraintButton");
    const releasePlaneButton = document.getElementById("releasePlaneButton");
    const confirmPlacementButton = document.getElementById("confirmPlacementButton");
    const cancelPlacementButton = document.getElementById("cancelPlacementButton");
    const clearSelectionButton = document.getElementById("clearSelectionButton");
    const deleteSelectedButton = document.getElementById("deleteSelectedButton");
    const editorStatus = document.getElementById("editorStatus");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function vec(x, y, z) { return { x, y, z }; }
    function add(a, b) { return vec(a.x + b.x, a.y + b.y, a.z + b.z); }
    function sub(a, b) { return vec(a.x - b.x, a.y - b.y, a.z - b.z); }
    function mul(v, s) { return vec(v.x * s, v.y * s, v.z * s); }
    function dot(a, b) { return a.x * b.x + a.y * b.y + a.z * b.z; }
    function cross(a, b) {
      return vec(
        a.y * b.z - a.z * b.y,
        a.z * b.x - a.x * b.z,
        a.x * b.y - a.y * b.x
      );
    }
    function length(v) { return Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z); }
    function normalize(v) {
      const len = length(v);
      if (len === 0) return vec(0, 0, 0);
      return vec(v.x / len, v.y / len, v.z / len);
    }
    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function sign(v) { return v > 0 ? 1 : v < 0 ? -1 : 0; }
    function distance2D(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

    function applyStickCurve(v, deadzone = 0.08, exponent = 2.6) {
      const a = Math.abs(v);
      if (a < deadzone) return 0;
      const normalized = (a - deadzone) / (1 - deadzone);
      const curved = Math.pow(normalized, exponent);
      return sign(v) * curved;
    }

    const INITIAL_CAMERA = {
      position: vec(0, 2, -8),
      yaw: 0,
      pitch: -0.25
    };

    const camera = {
      position: vec(INITIAL_CAMERA.position.x, INITIAL_CAMERA.position.y, INITIAL_CAMERA.position.z),
      yaw: INITIAL_CAMERA.yaw,
      pitch: INITIAL_CAMERA.pitch
    };

    const worldUp = vec(0, 1, 0);

    function resetCamera() {
      camera.position = vec(INITIAL_CAMERA.position.x, INITIAL_CAMERA.position.y, INITIAL_CAMERA.position.z);
      camera.yaw = INITIAL_CAMERA.yaw;
      camera.pitch = INITIAL_CAMERA.pitch;

      touchState.groundX = 0;
      touchState.groundY = 0;
      touchState.screenX = 0;
      touchState.screenY = 0;
      touchState.lookX = 0;
      touchState.lookY = 0;
    }

    function getCameraBasis() {
      const cp = Math.cos(camera.pitch);
      const sp = Math.sin(camera.pitch);
      const cy = Math.cos(camera.yaw);
      const sy = Math.sin(camera.yaw);

      const forward = normalize(vec(sy * cp, sp, cy * cp));
      let right = cross(forward, worldUp);
      right = length(right) < 0.0001 ? vec(1, 0, 0) : normalize(right);
      const up = normalize(cross(right, forward));
      return { forward, right, up };
    }

    function projectPoint(p) {
      const { forward, right, up } = getCameraBasis();
      const v = sub(p, camera.position);

      const X = dot(v, right);
      const Y = dot(v, up);
      const Z = dot(v, forward);

      if (Z <= 0.05) return { visible: false };

      const scale = 700;
      return {
        visible: true,
        x: canvas.width / 2 + (scale * X) / Z,
        y: canvas.height / 2 - (scale * Y) / Z,
        z: Z
      };
    }

    function drawLine3D(a, b, color = "white", width = 1) {
      const pa = projectPoint(a);
      const pb = projectPoint(b);
      if (!pa.visible || !pb.visible) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    function drawPoint3D(p, color = "white", size = 4) {
      const pp = projectPoint(p);
      if (!pp.visible) return;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(pp.x, pp.y, size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSquare3D(p, color = "white", size = 8) {
      const pp = projectPoint(p);
      if (!pp.visible) return;
      ctx.fillStyle = color;
      ctx.fillRect(pp.x - size / 2, pp.y - size / 2, size, size);
    }

    function drawGroundGrid() {
      const xMin = -20, xMax = 20, zMin = 1, zMax = 40, step = 1;
      for (let x = xMin; x <= xMax; x += step) {
        drawLine3D(vec(x, 0, zMin), vec(x, 0, zMax), x === 0 ? "#ffffff" : "#666666", x === 0 ? 2 : 1);
      }
      for (let z = zMin; z <= zMax; z += step) {
        drawLine3D(vec(xMin, 0, z), vec(xMax, 0, z), z % 5 === 0 ? "#888888" : "#444444", z % 5 === 0 ? 1.5 : 1);
      }
    }

    function drawAxes() {
      drawLine3D(vec(0, 0, 0), vec(3, 0, 0), "red", 2);
      drawLine3D(vec(0, 0, 0), vec(0, 3, 0), "lime", 2);
      drawLine3D(vec(0, 0, 0), vec(0, 0, 3), "cyan", 2);
    }

    let editorEnabled = true;
    let editorPanelEnabled = true;
    let infoEnabled = false;
    let moveModeEnabled = false;

    let nextNodeId = 1;
    let nextEdgeId = 1;

    const editorNodes = [];
    const editorEdges = [];
    const editorFaces = [];
    const selectedNodeIds = [];

    const editorState = {
      placementMode: false,
      activePlacementNodeId: null,
      activePlacementMirrorId: null,
      symmetryMode: false,
      showMirrorPlane: true,
      mirrorValue: 0,
      planeConstraint: true,
      activeGizmoAxis: null,
      gizmoTouchId: null,
      gizmoLastX: 0,
      gizmoLastY: 0
    };

    function getNodeById(id) {
      return editorNodes.find(n => n.id === id) || null;
    }

    function edgeExists(a, b) {
      return editorEdges.some(e => (e.a === a && e.b === b) || (e.a === b && e.b === a));
    }

    function removeEdgesForNode(nodeId) {
      for (let i = editorEdges.length - 1; i >= 0; i--) {
        if (editorEdges[i].a === nodeId || editorEdges[i].b === nodeId) editorEdges.splice(i, 1);
      }
    }

    function getSpawnPosition(onMirrorPlane = false) {
      const { forward } = getCameraBasis();
      const base = add(camera.position, mul(forward, 6));
      return onMirrorPlane ? vec(editorState.mirrorValue, base.y, base.z) : vec(base.x, base.y, base.z);
    }

    function createEditorNodeData(type, dof, p, mirrored = false) {
      return {
        id: nextNodeId++,
        type,
        dof,
        x: p.x,
        y: p.y,
        z: p.z,
        isTemporary: true,
        mirrorPairId: null,
        mirrored
      };
    }

    function addEditorNode(type, dof) {
      const p = getSpawnPosition(!editorState.symmetryMode);
      const node = createEditorNodeData(type, dof, p, false);
      editorNodes.push(node);

      let mirrorNode = null;
      if (editorState.symmetryMode) {
        const mp = vec(2 * editorState.mirrorValue - p.x, p.y, p.z);
        mirrorNode = createEditorNodeData(type, dof, mp, true);
        editorNodes.push(mirrorNode);
        node.mirrorPairId = mirrorNode.id;
        mirrorNode.mirrorPairId = node.id;
      } else if (editorState.planeConstraint) {
        node.x = editorState.mirrorValue;
      }

      selectedNodeIds.length = 0;
      selectedNodeIds.push(node.id);

      editorState.placementMode = true;
      editorState.activePlacementNodeId = node.id;
      editorState.activePlacementMirrorId = mirrorNode ? mirrorNode.id : null;
      editorState.activeGizmoAxis = null;
      editorState.gizmoTouchId = null;

      updateEditorStatus();
    }

    function clearSelection() {
      selectedNodeIds.length = 0;
      editorState.activeGizmoAxis = null;
      editorState.gizmoTouchId = null;
      updateEditorStatus();
    }

    function toggleNodeSelection(id) {
      if (editorState.placementMode) return;
      const idx = selectedNodeIds.indexOf(id);
      if (idx >= 0) selectedNodeIds.splice(idx, 1);
      else {
        if (selectedNodeIds.length >= 2) selectedNodeIds.shift();
        selectedNodeIds.push(id);
      }
      editorState.activeGizmoAxis = null;
      editorState.gizmoTouchId = null;
      updateEditorStatus();
    }

    function getPrimarySelectedNode() {
      if (selectedNodeIds.length === 0) return null;
      return getNodeById(selectedNodeIds[selectedNodeIds.length - 1]);
    }

    function getPlacementNode() {
      return getNodeById(editorState.activePlacementNodeId);
    }

    function getPlacementMirrorNode() {
      return getNodeById(editorState.activePlacementMirrorId);
    }

    function confirmPlacement() {
      const node = getPlacementNode();
      if (!node) return;
      node.isTemporary = false;
      const mirror = getPlacementMirrorNode();
      if (mirror) mirror.isTemporary = false;
      editorState.placementMode = false;
      editorState.activePlacementNodeId = null;
      editorState.activePlacementMirrorId = null;
      editorState.activeGizmoAxis = null;
      editorState.gizmoTouchId = null;
      updateEditorStatus();
    }

    function cancelPlacement() {
      const ids = [editorState.activePlacementNodeId, editorState.activePlacementMirrorId];
      for (const id of ids) {
        if (id == null) continue;
        const idx = editorNodes.findIndex(n => n.id === id);
        if (idx >= 0) editorNodes.splice(idx, 1);
      }
      editorState.placementMode = false;
      editorState.activePlacementNodeId = null;
      editorState.activePlacementMirrorId = null;
      editorState.activeGizmoAxis = null;
      editorState.gizmoTouchId = null;
      clearSelection();
      updateEditorStatus();
    }

    function connectSelectedNodes() {
      if (selectedNodeIds.length !== 2) return;
      const [a, b] = selectedNodeIds;
      if (a === b || edgeExists(a, b)) return;
      editorEdges.push({ id: nextEdgeId++, a, b });
      updateEditorStatus();
    }

    function disconnectSelectedNodes() {
      if (selectedNodeIds.length !== 2) return;
      const [a, b] = selectedNodeIds;
      for (let i = editorEdges.length - 1; i >= 0; i--) {
        const e = editorEdges[i];
        if ((e.a === a && e.b === b) || (e.a === b && e.b === a)) editorEdges.splice(i, 1);
      }
      updateEditorStatus();
    }

    function deleteSelectedNodes() {
      for (const id of [...selectedNodeIds]) {
        const index = editorNodes.findIndex(n => n.id === id);
        if (index >= 0) {
          removeEdgesForNode(id);
          editorNodes.splice(index, 1);
        }
      }
      clearSelection();
      updateEditorStatus();
    }

    function getNodeColor(node) {
      if (node.type === "point") return "#ffffff";
      if (node.dof === 1) return "#ffd54a";
      if (node.dof === 2) return "#6aff7d";
      if (node.dof === 3) return "#6ab7ff";
      return "#cccccc";
    }

    function updateEditorStatus() {
      const selectedText = selectedNodeIds.map(id => {
        const n = getNodeById(id);
        if (!n) return `#${id}`;
        return `${n.type === "point" ? "点" : `${n.dof}自由度関節`} #${n.id}`;
      });

      const primary = editorState.placementMode ? getPlacementNode() : getPrimarySelectedNode();
      const coordText = primary
        ? `主対象座標:
x=${primary.x.toFixed(2)}
y=${primary.y.toFixed(2)}
z=${primary.z.toFixed(2)}`
        : `主対象座標:
なし`;

      editorStatus.textContent =
`ノード数: ${editorNodes.length}
接続数: ${editorEdges.length}
面データ数: ${editorFaces.length}
選択: ${selectedText.length ? selectedText.join(" / ") : "なし"}
移動モード: ${moveModeEnabled ? "ON" : "OFF"}
仮配置: ${editorState.placementMode ? "ON" : "OFF"}
対称モード: ${editorState.symmetryMode ? "ON" : "OFF"}
平面拘束: ${editorState.planeConstraint ? "ON" : "OFF"}
軸操作: ${editorState.activeGizmoAxis || "なし"}

${coordText}`;
    }

    function updatePanels() {
      infoPanel.style.display = infoEnabled ? "block" : "none";
      editorPanel.style.display = (editorEnabled && editorPanelEnabled) ? "block" : "none";

      toggleInfoButton.textContent = `操作説明: ${infoEnabled ? "ON" : "OFF"}`;
      toggleEditorButton.textContent = `人形作成: ${editorEnabled ? "ON" : "OFF"}`;
      toggleEditorPanelButton.textContent = `編集パネル: ${editorPanelEnabled ? "ON" : "OFF"}`;
      toggleMoveModeButton.textContent = `移動モード: ${moveModeEnabled ? "ON" : "OFF"}`;
      toggleSymmetryButton.textContent = `対称モード: ${editorState.symmetryMode ? "ON" : "OFF"}`;
      toggleMirrorPlaneButton.textContent = `対称平面表示: ${editorState.showMirrorPlane ? "ON" : "OFF"}`;
      togglePlaneConstraintButton.textContent = `平面拘束: ${editorState.planeConstraint ? "ON" : "OFF"}`;

      confirmPlacementButton.disabled = !editorState.placementMode;
      cancelPlacementButton.disabled = !editorState.placementMode;
      releasePlaneButton.disabled = !editorState.planeConstraint;
    }

    function getGizmoInfo(node) {
      if (!node) return null;
      const origin = vec(node.x, node.y, node.z);
      return {
        origin,
        xEnd: vec(node.x + 0.8, node.y, node.z),
        yEnd: vec(node.x, node.y + 0.8, node.z),
        zEnd: vec(node.x, node.y, node.z + 0.8)
      };
    }

    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const abLen2 = abx * abx + aby * aby;
      if (abLen2 < 0.0001) return Math.hypot(px - ax, py - ay);

      let t = (apx * abx + apy * aby) / abLen2;
      t = Math.max(0, Math.min(1, t));

      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function pickNodeAtScreen(x, y) {
      let bestId = null;
      let bestDist = Infinity;
      for (const node of editorNodes) {
        const pp = projectPoint(vec(node.x, node.y, node.z));
        if (!pp.visible) continue;
        const dist = distance2D(pp.x, pp.y, x, y);
        if (dist < 24 && dist < bestDist) {
          bestDist = dist;
          bestId = node.id;
        }
      }
      return bestId;
    }

    function pickGizmoAxisAtScreen(x, y, node) {
      const gizmo = getGizmoInfo(node);
      if (!gizmo) return null;

      const originP = projectPoint(gizmo.origin);
      const xP = projectPoint(gizmo.xEnd);
      const yP = projectPoint(gizmo.yEnd);
      const zP = projectPoint(gizmo.zEnd);
      if (!originP.visible) return null;

      const candidates = [];

      if (xP.visible) {
        candidates.push({
          axis: "x",
          dist: Math.min(
            distance2D(xP.x, xP.y, x, y),
            pointToSegmentDistance(x, y, originP.x, originP.y, xP.x, xP.y)
          )
        });
      }

      if (yP.visible) {
        candidates.push({
          axis: "y",
          dist: Math.min(
            distance2D(yP.x, yP.y, x, y),
            pointToSegmentDistance(x, y, originP.x, originP.y, yP.x, yP.y)
          )
        });
      }

      if (zP.visible) {
        candidates.push({
          axis: "z",
          dist: Math.min(
            distance2D(zP.x, zP.y, x, y),
            pointToSegmentDistance(x, y, originP.x, originP.y, zP.x, zP.y)
          )
        });
      }

      let best = null;
      let bestDist = Infinity;
      for (const c of candidates) {
        if (c.dist < 18 && c.dist < bestDist) {
          bestDist = c.dist;
          best = c.axis;
        }
      }
      return best;
    }

    function getProjectedGizmoAxisDirection(node, axis) {
      const gizmo = getGizmoInfo(node);
      if (!gizmo) return null;

      const originP = projectPoint(gizmo.origin);
      let endP = null;

      if (axis === "x") endP = projectPoint(gizmo.xEnd);
      else if (axis === "y") endP = projectPoint(gizmo.yEnd);
      else if (axis === "z") endP = projectPoint(gizmo.zEnd);

      if (!originP.visible || !endP || !endP.visible) return null;

      const dx = endP.x - originP.x;
      const dy = endP.y - originP.y;
      const len = Math.hypot(dx, dy);
      if (len < 0.0001) return null;

      return { x: dx / len, y: dy / len };
    }

    function applyMirrorAndPlane(node) {
      if (!node) return;
      if (node.mirrorPairId) {
        const mirror = getNodeById(node.mirrorPairId);
        if (mirror) {
          mirror.x = 2 * editorState.mirrorValue - node.x;
          mirror.y = node.y;
          mirror.z = node.z;
        }
      } else if (editorState.planeConstraint) {
        node.x = editorState.mirrorValue;
      }
    }

    function moveNodeAlongAxis(node, axis, amount) {
      if (!node) return;
      const speed = 0.02;

      if (axis === "x") node.x += amount * speed;
      else if (axis === "y") node.y += amount * speed;
      else if (axis === "z") node.z += amount * speed;

      applyMirrorAndPlane(node);
      updateEditorStatus();
    }

    function drawMirrorPlane() {
      if (!editorEnabled || !editorState.showMirrorPlane) return;
      const x = editorState.mirrorValue;
      const y0 = -1, y1 = 4, z0 = 2, z1 = 20;

      for (let y = y0; y <= y1; y += 1) {
        drawLine3D(vec(x, y, z0), vec(x, y, z1), "rgba(120,160,255,0.22)", 1);
      }
      for (let z = z0; z <= z1; z += 1) {
        drawLine3D(vec(x, y0, z), vec(x, y1, z), "rgba(120,160,255,0.22)", 1);
      }
      drawLine3D(vec(x, y0, z0), vec(x, y1, z0), "rgba(160,220,255,0.55)", 2);
      drawLine3D(vec(x, y0, z1), vec(x, y1, z1), "rgba(160,220,255,0.55)", 2);
    }

    function drawEditorEdges() {
      for (const edge of editorEdges) {
        const a = getNodeById(edge.a);
        const b = getNodeById(edge.b);
        if (!a || !b) continue;

        const isSelectedPair =
          selectedNodeIds.length === 2 &&
          ((selectedNodeIds[0] === edge.a && selectedNodeIds[1] === edge.b) ||
           (selectedNodeIds[0] === edge.b && selectedNodeIds[1] === edge.a));

        drawLine3D(vec(a.x, a.y, a.z), vec(b.x, b.y, b.z), isSelectedPair ? "#ff66ff" : "#aaaaaa", isSelectedPair ? 3 : 2);
      }
    }

    function drawEditorNodes() {
      for (const node of editorNodes) {
        const selected = selectedNodeIds.includes(node.id);
        let color = getNodeColor(node);
        const p = vec(node.x, node.y, node.z);

        if (node.isTemporary) color = node.type === "point" ? "#ffddaa" : "#ffcc66";

        if (selected) {
          if (node.type === "point") drawSquare3D(p, "#ff4444", 14);
          else drawPoint3D(p, "#ff4444", 7);
        } else {
          if (node.type === "point") drawSquare3D(p, color, 10);
          else drawPoint3D(p, color, 5);
        }
      }
    }

    function drawGizmo() {
      let node = null;
      if (editorState.placementMode) node = getPlacementNode();
      else if (moveModeEnabled) node = getPrimarySelectedNode();
      if (!node) return;

      const g = getGizmoInfo(node);
      if (!g) return;

      const xColor = editorState.activeGizmoAxis === "x" ? "#ff8888" : "#ff3333";
      const yColor = editorState.activeGizmoAxis === "y" ? "#88ff88" : "#33ff33";
      const zColor = editorState.activeGizmoAxis === "z" ? "#8888ff" : "#3399ff";

      drawLine3D(g.origin, g.xEnd, xColor, 4);
      drawLine3D(g.origin, g.yEnd, yColor, 4);
      drawLine3D(g.origin, g.zEnd, zColor, 4);

      drawPoint3D(g.xEnd, xColor, 6);
      drawPoint3D(g.yEnd, yColor, 6);
      drawPoint3D(g.zEnd, zColor, 6);
    }

    function drawBackground() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawDebugText() {
      ctx.fillStyle = "white";
      ctx.font = "11px sans-serif";
      ctx.fillText(`camera: (${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)})`, 8, canvas.height - 30);
      ctx.fillText(`yaw: ${camera.yaw.toFixed(2)}   pitch: ${camera.pitch.toFixed(2)}`, 8, canvas.height - 15);
    }

    function drawStick(base, knobX, knobY, strokeColor, fillColor) {
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(base.x, base.y, STICK_BASE_RADIUS, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(base.x, base.y, 2, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.arc(knobX, knobY, STICK_KNOB_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    function getKnobPosition(base, xPos, yPos, activeId) {
      let knobX = base.x, knobY = base.y;
      if (activeId !== null) {
        const dx = xPos - base.x;
        const dy = yPos - base.y;
        const dist = Math.hypot(dx, dy);

        let mx = dx, my = dy;
        if (dist > STICK_MAX_DIST && dist > 0) {
          mx = dx * STICK_MAX_DIST / dist;
          my = dy * STICK_MAX_DIST / dist;
        }
        knobX = base.x + mx;
        knobY = base.y + my;
      }
      return { knobX, knobY };
    }

    function getGroundStickBase() {
      return { x: 78, y: canvas.height - 150 };
    }

    function getScreenStickBase() {
      return { x: 78, y: canvas.height - 220 };
    }

    function getLookStickBase() {
      const panelVisible = editorEnabled && editorPanelEnabled;
      const panelWidth = panelVisible ? 206 : 0;
      const marginRight = panelVisible ? (panelWidth + 70) : 78;
      return { x: canvas.width - marginRight, y: canvas.height - 150 };
    }

    const STICK_BASE_RADIUS = 30;
    const STICK_KNOB_RADIUS = 13;
    const STICK_MAX_DIST = 20;
    const STICK_TOUCH_RANGE = 48;

    const GROUND_STICK_TOUCH_OFFSET_Y = 70;
    const SCREEN_STICK_TOUCH_OFFSET_Y = 70;
    const LOOK_STICK_TOUCH_OFFSET_Y = 70;

    const touchState = {
      groundId: null, screenId: null, lookId: null,
      groundXPos: 0, groundYPos: 0,
      screenXPos: 0, screenYPos: 0,
      lookXPos: 0, lookYPos: 0,
      groundX: 0, groundY: 0,
      screenX: 0, screenY: 0,
      lookX: 0, lookY: 0
    };

    function getInteractiveGizmoNode() {
      if (editorState.placementMode) return getPlacementNode();
      if (moveModeEnabled) return getPrimarySelectedNode();
      return null;
    }

    function setupTouchControls() {
      canvas.addEventListener("touchstart", (e) => {
        if (e.target !== canvas) return;
        e.preventDefault();

        const groundBase = getGroundStickBase();
        const screenBase = getScreenStickBase();
        const lookBase = getLookStickBase();

        const gizmoNode = getInteractiveGizmoNode();
        if (editorEnabled && gizmoNode) {
          for (const t of e.changedTouches) {
            const axis = pickGizmoAxisAtScreen(t.clientX, t.clientY, gizmoNode);
            if (axis) {
              editorState.activeGizmoAxis = axis;
              editorState.gizmoTouchId = t.identifier;
              editorState.gizmoLastX = t.clientX;
              editorState.gizmoLastY = t.clientY;
              updateEditorStatus();
              return;
            }
          }
        }

        if (editorEnabled && !editorState.placementMode) {
          for (const t of e.changedTouches) {
            const pickedId = pickNodeAtScreen(t.clientX, t.clientY);
            if (pickedId !== null) {
              toggleNodeSelection(pickedId);
              return;
            }
          }
        }

        for (const t of e.changedTouches) {
          const adjustedGroundY = t.clientY - GROUND_STICK_TOUCH_OFFSET_Y;
          const adjustedScreenY = t.clientY - SCREEN_STICK_TOUCH_OFFSET_Y;
          const adjustedLookY = t.clientY - LOOK_STICK_TOUCH_OFFSET_Y;

          const distGround = Math.hypot(t.clientX - groundBase.x, adjustedGroundY - groundBase.y);
          const distScreen = Math.hypot(t.clientX - screenBase.x, adjustedScreenY - screenBase.y);
          const distLook = Math.hypot(t.clientX - lookBase.x, adjustedLookY - lookBase.y);

          if (distGround <= STICK_TOUCH_RANGE && touchState.groundId === null) {
            touchState.groundId = t.identifier;
            touchState.groundXPos = t.clientX;
            touchState.groundYPos = adjustedGroundY;
            continue;
          }
          if (distScreen <= STICK_TOUCH_RANGE && touchState.screenId === null) {
            touchState.screenId = t.identifier;
            touchState.screenXPos = t.clientX;
            touchState.screenYPos = adjustedScreenY;
            continue;
          }
          if (distLook <= STICK_TOUCH_RANGE && touchState.lookId === null) {
            touchState.lookId = t.identifier;
            touchState.lookXPos = t.clientX;
            touchState.lookYPos = adjustedLookY;
            continue;
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();

        const interactiveNode = getInteractiveGizmoNode();

        for (const t of e.changedTouches) {
          if (editorState.gizmoTouchId !== null &&
              t.identifier === editorState.gizmoTouchId &&
              interactiveNode &&
              editorState.activeGizmoAxis) {

            const dx = t.clientX - editorState.gizmoLastX;
            const dy = t.clientY - editorState.gizmoLastY;

            const dir = getProjectedGizmoAxisDirection(interactiveNode, editorState.activeGizmoAxis);
            if (dir) {
              const amount = dx * dir.x + dy * dir.y;
              moveNodeAlongAxis(interactiveNode, editorState.activeGizmoAxis, amount);
            }

            editorState.gizmoLastX = t.clientX;
            editorState.gizmoLastY = t.clientY;
            continue;
          }
        }

        const groundBase = getGroundStickBase();
        const screenBase = getScreenStickBase();
        const lookBase = getLookStickBase();

        for (const t of e.changedTouches) {
          if (t.identifier === touchState.groundId) {
            const ay = t.clientY - GROUND_STICK_TOUCH_OFFSET_Y;
            touchState.groundXPos = t.clientX;
            touchState.groundYPos = ay;

            const dx = t.clientX - groundBase.x;
            const dy = ay - groundBase.y;
            const dist = Math.hypot(dx, dy);

            let mx = dx, my = dy;
            if (dist > STICK_MAX_DIST && dist > 0) {
              mx = dx * STICK_MAX_DIST / dist;
              my = dy * STICK_MAX_DIST / dist;
            }
            touchState.groundX = clamp(mx / STICK_MAX_DIST, -1, 1);
            touchState.groundY = clamp(my / STICK_MAX_DIST, -1, 1);
          }

          if (t.identifier === touchState.screenId) {
            const ay = t.clientY - SCREEN_STICK_TOUCH_OFFSET_Y;
            touchState.screenXPos = t.clientX;
            touchState.screenYPos = ay;

            const dx = t.clientX - screenBase.x;
            const dy = ay - screenBase.y;
            const dist = Math.hypot(dx, dy);

            let mx = dx, my = dy;
            if (dist > STICK_MAX_DIST && dist > 0) {
              mx = dx * STICK_MAX_DIST / dist;
              my = dy * STICK_MAX_DIST / dist;
            }
            touchState.screenX = clamp(mx / STICK_MAX_DIST, -1, 1);
            touchState.screenY = clamp(my / STICK_MAX_DIST, -1, 1);
          }

          if (t.identifier === touchState.lookId) {
            const ay = t.clientY - LOOK_STICK_TOUCH_OFFSET_Y;
            touchState.lookXPos = t.clientX;
            touchState.lookYPos = ay;

            const dx = t.clientX - lookBase.x;
            const dy = ay - lookBase.y;
            const dist = Math.hypot(dx, dy);

            let mx = dx, my = dy;
            if (dist > STICK_MAX_DIST && dist > 0) {
              mx = dx * STICK_MAX_DIST / dist;
              my = dy * STICK_MAX_DIST / dist;
            }
            touchState.lookX = clamp(mx / STICK_MAX_DIST, -1, 1);
            touchState.lookY = clamp(my / STICK_MAX_DIST, -1, 1);
          }
        }
      }, { passive: false });

      function endTouch(e) {
        e.preventDefault();

        for (const t of e.changedTouches) {
          if (t.identifier === editorState.gizmoTouchId) {
            editorState.gizmoTouchId = null;
            editorState.activeGizmoAxis = null;
          }

          if (t.identifier === touchState.groundId) {
            touchState.groundId = null;
            touchState.groundX = 0;
            touchState.groundY = 0;
          }
          if (t.identifier === touchState.screenId) {
            touchState.screenId = null;
            touchState.screenX = 0;
            touchState.screenY = 0;
          }
          if (t.identifier === touchState.lookId) {
            touchState.lookId = null;
            touchState.lookX = 0;
            touchState.lookY = 0;
          }
        }
        updateEditorStatus();
      }

      canvas.addEventListener("touchend", endTouch, { passive: false });
      canvas.addEventListener("touchcancel", endTouch, { passive: false });
    }

    toggleInfoButton.addEventListener("click", () => {
      infoEnabled = !infoEnabled;
      updatePanels();
    });

    toggleEditorButton.addEventListener("click", () => {
      editorEnabled = !editorEnabled;
      if (!editorEnabled) {
        editorPanelEnabled = false;
        moveModeEnabled = false;
        clearSelection();
        if (editorState.placementMode) cancelPlacement();
      }
      updatePanels();
      updateEditorStatus();
    });

    toggleEditorPanelButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      editorPanelEnabled = !editorPanelEnabled;
      updatePanels();
    });

    addJoint1Button.addEventListener("click", () => {
      if (!editorEnabled) return;
      addEditorNode("joint", 1);
      updatePanels();
    });

    addJoint2Button.addEventListener("click", () => {
      if (!editorEnabled) return;
      addEditorNode("joint", 2);
      updatePanels();
    });

    addJoint3Button.addEventListener("click", () => {
      if (!editorEnabled) return;
      addEditorNode("joint", 3);
      updatePanels();
    });

    addPointButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      addEditorNode("point", 0);
      updatePanels();
    });

    connectButton.addEventListener("click", () => {
      if (!editorEnabled || editorState.placementMode) return;
      connectSelectedNodes();
    });

    disconnectButton.addEventListener("click", () => {
      if (!editorEnabled || editorState.placementMode) return;
      disconnectSelectedNodes();
    });

    toggleMoveModeButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      moveModeEnabled = !moveModeEnabled;
      editorState.activeGizmoAxis = null;
      editorState.gizmoTouchId = null;
      updatePanels();
      updateEditorStatus();
    });

    toggleSymmetryButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      editorState.symmetryMode = !editorState.symmetryMode;
      updatePanels();
      updateEditorStatus();
    });

    toggleMirrorPlaneButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      editorState.showMirrorPlane = !editorState.showMirrorPlane;
      updatePanels();
    });

    togglePlaneConstraintButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      editorState.planeConstraint = !editorState.planeConstraint;
      const node = editorState.placementMode ? getPlacementNode() : getPrimarySelectedNode();
      if (node) applyMirrorAndPlane(node);
      updatePanels();
      updateEditorStatus();
    });

    releasePlaneButton.addEventListener("click", () => {
      if (!editorEnabled) return;
      editorState.planeConstraint = false;
      updatePanels();
      updateEditorStatus();
    });

    confirmPlacementButton.addEventListener("click", () => {
      confirmPlacement();
      updatePanels();
    });

    cancelPlacementButton.addEventListener("click", () => {
      cancelPlacement();
      updatePanels();
    });

    clearSelectionButton.addEventListener("click", () => {
      clearSelection();
    });

    deleteSelectedButton.addEventListener("click", () => {
      if (!editorEnabled || editorState.placementMode) return;
      deleteSelectedNodes();
    });

    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === "r" || e.key === "R") resetCamera();
    });
    window.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function drawTouchUI() {
      const groundBase = getGroundStickBase();
      const screenBase = getScreenStickBase();
      const lookBase = getLookStickBase();

      const g = getKnobPosition(groundBase, touchState.groundXPos, touchState.groundYPos, touchState.groundId);
      const s = getKnobPosition(screenBase, touchState.screenXPos, touchState.screenYPos, touchState.screenId);
      const l = getKnobPosition(lookBase, touchState.lookXPos, touchState.lookYPos, touchState.lookId);

      drawStick(groundBase, g.knobX, g.knobY, "rgba(255,255,255,0.35)", "rgba(255,255,255,0.25)");
      drawStick(screenBase, s.knobX, s.knobY, "rgba(180,255,180,0.40)", "rgba(180,255,180,0.22)");
      drawStick(lookBase, l.knobX, l.knobY, "rgba(100,180,255,0.45)", "rgba(100,180,255,0.28)");
    }

    function updateCamera() {
      const { forward, right, up } = getCameraBasis();

      const moveSpeed = 0.12;
      const verticalSpeed = 0.08;
      const rotateSpeed = 0.025;

      if (keys["ArrowUp"]) camera.position = add(camera.position, mul(forward, moveSpeed));
      if (keys["ArrowDown"]) camera.position = add(camera.position, mul(forward, -moveSpeed));
      if (keys["ArrowLeft"]) camera.position = add(camera.position, mul(right, -moveSpeed));
      if (keys["ArrowRight"]) camera.position = add(camera.position, mul(right, moveSpeed));
      if (keys["q"] || keys["Q"]) camera.position.y += verticalSpeed;
      if (keys["e"] || keys["E"]) camera.position.y -= verticalSpeed;
      if (keys["a"] || keys["A"]) camera.yaw -= rotateSpeed;
      if (keys["d"] || keys["D"]) camera.yaw += rotateSpeed;
      if (keys["w"] || keys["W"]) camera.pitch += rotateSpeed;
      if (keys["s"] || keys["S"]) camera.pitch -= rotateSpeed;

      const groundInputX = applyStickCurve(touchState.groundX, 0.08, 2.8);
      const groundInputY = applyStickCurve(touchState.groundY, 0.08, 2.8);
      const screenInputX = applyStickCurve(touchState.screenX, 0.08, 2.8);
      const screenInputY = applyStickCurve(touchState.screenY, 0.08, 2.8);
      const lookInputX = applyStickCurve(touchState.lookX, 0.10, 3.2);
      const lookInputY = applyStickCurve(touchState.lookY, 0.10, 3.2);

      const flatForward = normalize(vec(forward.x, 0, forward.z));
      const flatRight = normalize(vec(right.x, 0, right.z));

      if (touchState.groundId !== null) {
        camera.position = add(camera.position, mul(flatRight, groundInputX * moveSpeed));
        camera.position = add(camera.position, mul(flatForward, -groundInputY * moveSpeed));
      }

      if (touchState.screenId !== null) {
        camera.position = add(camera.position, mul(right, screenInputX * moveSpeed * 0.5));
        camera.position = add(camera.position, mul(up, -screenInputY * moveSpeed * 0.5));
      }

      if (touchState.lookId !== null) {
        const stickLookSpeed = 0.01;
        camera.yaw -= lookInputX * stickLookSpeed;
        camera.pitch -= lookInputY * stickLookSpeed;
      }

      const limit = Math.PI / 2 - 0.05;
      if (camera.pitch > limit) camera.pitch = limit;
      if (camera.pitch < -limit) camera.pitch = -limit;
    }

    function drawGizmo() {
      let node = null;
      if (editorState.placementMode) node = getPlacementNode();
      else if (moveModeEnabled) node = getPrimarySelectedNode();
      if (!node) return;

      const g = getGizmoInfo(node);
      if (!g) return;

      const xColor = editorState.activeGizmoAxis === "x" ? "#ff8888" : "#ff3333";
      const yColor = editorState.activeGizmoAxis === "y" ? "#88ff88" : "#33ff33";
      const zColor = editorState.activeGizmoAxis === "z" ? "#8888ff" : "#3399ff";

      drawLine3D(g.origin, g.xEnd, xColor, 4);
      drawLine3D(g.origin, g.yEnd, yColor, 4);
      drawLine3D(g.origin, g.zEnd, zColor, 4);

      drawPoint3D(g.xEnd, xColor, 6);
      drawPoint3D(g.yEnd, yColor, 6);
      drawPoint3D(g.zEnd, zColor, 6);
    }

    function loop() {
      updateCamera();
      drawBackground();
      drawGroundGrid();
      drawAxes();
      drawMirrorPlane();
      drawEditorEdges();
      drawEditorNodes();
      drawGizmo();
      drawTouchUI();
      drawDebugText();
      requestAnimationFrame(loop);
    }

    resetButton.addEventListener("click", resetCamera);
    resetButton.addEventListener("touchstart", (e) => {
      e.preventDefault();
      resetCamera();
    }, { passive: false });

    setupTouchControls();
    updatePanels();
    updateEditorStatus();
    loop();
  </script>
</body>
</html>
