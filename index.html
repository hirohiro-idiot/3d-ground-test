<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D Ground Grid Fixed Stick</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
      touch-action: none;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      touch-action: none;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 13px;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      user-select: none;
      z-index: 10;
      max-width: 82vw;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="info">
    PC: ↑↓ 前後 / ←→ 平行移動 / A D 回転 / W S 見上げ見下ろし / Q E 上下<br>
    スマホ: 左下固定スティックで移動 / 右側スワイプで視点操作
  </div>

  <script>
    // =========================
    // 1. Canvas
    // =========================
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // =========================
    // 2. ベクトル関数
    // =========================
    function vec(x, y, z) {
      return { x, y, z };
    }

    function add(a, b) {
      return vec(a.x + b.x, a.y + b.y, a.z + b.z);
    }

    function sub(a, b) {
      return vec(a.x - b.x, a.y - b.y, a.z - b.z);
    }

    function mul(v, s) {
      return vec(v.x * s, v.y * s, v.z * s);
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y + a.z * b.z;
    }

    function cross(a, b) {
      return vec(
        a.y * b.z - a.z * b.y,
        a.z * b.x - a.x * b.z,
        a.x * b.y - a.y * b.x
      );
    }

    function length(v) {
      return Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
    }

    function normalize(v) {
      const len = length(v);
      if (len === 0) return vec(0, 0, 0);
      return vec(v.x / len, v.y / len, v.z / len);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    // =========================
    // 3. カメラ
    // =========================
    const camera = {
      position: vec(0, 2, -8),
      yaw: 0,
      pitch: -0.25
    };

    const worldUp = vec(0, 1, 0);

    function getCameraBasis() {
      const cp = Math.cos(camera.pitch);
      const sp = Math.sin(camera.pitch);
      const cy = Math.cos(camera.yaw);
      const sy = Math.sin(camera.yaw);

      const forward = normalize(vec(
        sy * cp,
        sp,
        cy * cp
      ));

      let right = cross(forward, worldUp);

      if (length(right) < 0.0001) {
        right = vec(1, 0, 0);
      } else {
        right = normalize(right);
      }

      const up = normalize(cross(right, forward));

      return { forward, right, up };
    }

    // =========================
    // 4. 3D -> 2D 投影
    // =========================
    function projectPoint(p) {
      const { forward, right, up } = getCameraBasis();
      const v = sub(p, camera.position);

      const X = dot(v, right);
      const Y = dot(v, up);
      const Z = dot(v, forward);

      if (Z <= 0.05) {
        return { visible: false };
      }

      const scale = 700;

      const screenX = canvas.width / 2 + (scale * X) / Z;
      const screenY = canvas.height / 2 - (scale * Y) / Z;

      return {
        visible: true,
        x: screenX,
        y: screenY,
        z: Z
      };
    }

    // =========================
    // 5. 3D線描画
    // =========================
    function drawLine3D(a, b, color = "white", width = 1) {
      const pa = projectPoint(a);
      const pb = projectPoint(b);

      if (!pa.visible || !pb.visible) return;

      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    // =========================
    // 6. 地面
    // =========================
    function drawGroundGrid() {
      const xMin = -20;
      const xMax = 20;
      const zMin = 1;
      const zMax = 40;
      const step = 1;

      for (let x = xMin; x <= xMax; x += step) {
        const a = vec(x, 0, zMin);
        const b = vec(x, 0, zMax);
        const isMain = (x === 0);
        drawLine3D(a, b, isMain ? "#ffffff" : "#666666", isMain ? 2 : 1);
      }

      for (let z = zMin; z <= zMax; z += step) {
        const a = vec(xMin, 0, z);
        const b = vec(xMax, 0, z);
        const isMain = (z % 5 === 0);
        drawLine3D(a, b, isMain ? "#888888" : "#444444", isMain ? 1.5 : 1);
      }
    }

    // =========================
    // 7. 座標軸
    // =========================
    function drawAxes() {
      drawLine3D(vec(0, 0, 0), vec(3, 0, 0), "red", 2);
      drawLine3D(vec(0, 0, 0), vec(0, 3, 0), "lime", 2);
      drawLine3D(vec(0, 0, 0), vec(0, 0, 3), "cyan", 2);
    }

    // =========================
    // 8. キー入力
    // =========================
    const keys = {};

    window.addEventListener("keydown", (e) => {
      keys[e.key] = true;
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    // =========================
    // 9. 固定スティック設定
    // =========================
    function getStickBase() {
      return {
        x: 90,
        y: canvas.height - 90
      };
    }

    const STICK_BASE_RADIUS = 60;
    const STICK_KNOB_RADIUS = 26;
    const STICK_MAX_DIST = 40;
    const STICK_TOUCH_RANGE = 95;

    // =========================
    // 10. タッチ入力
    // =========================
    const touchState = {
      leftId: null,
      rightId: null,

      leftX: 0,
      leftY: 0,

      rightPrevX: 0,
      rightPrevY: 0,

      moveX: 0,
      moveY: 0,
      lookX: 0,
      lookY: 0
    };

    function setupTouchControls() {
      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();

        const base = getStickBase();

        for (const t of e.changedTouches) {
          const dx = t.clientX - base.x;
          const dy = t.clientY - base.y;
          const dist = Math.hypot(dx, dy);

          // 左下固定スティック付近なら移動用
          if (dist <= STICK_TOUCH_RANGE && touchState.leftId === null) {
            touchState.leftId = t.identifier;
            touchState.leftX = t.clientX;
            touchState.leftY = t.clientY;
            continue;
          }

          // それ以外は視点操作用
          if (touchState.rightId === null) {
            touchState.rightId = t.identifier;
            touchState.rightPrevX = t.clientX;
            touchState.rightPrevY = t.clientY;
          }
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();

        const base = getStickBase();

        for (const t of e.changedTouches) {
          if (t.identifier === touchState.leftId) {
            touchState.leftX = t.clientX;
            touchState.leftY = t.clientY;

            const dx = t.clientX - base.x;
            const dy = t.clientY - base.y;
            const dist = Math.hypot(dx, dy);

            let mx = dx;
            let my = dy;

            if (dist > STICK_MAX_DIST && dist > 0) {
              mx = dx * STICK_MAX_DIST / dist;
              my = dy * STICK_MAX_DIST / dist;
            }

            touchState.moveX = clamp(mx / STICK_MAX_DIST, -1, 1);
            touchState.moveY = clamp(my / STICK_MAX_DIST, -1, 1);
          }

          if (t.identifier === touchState.rightId) {
            const dx = t.clientX - touchState.rightPrevX;
            const dy = t.clientY - touchState.rightPrevY;

            touchState.lookX += dx;
            touchState.lookY += dy;

            touchState.rightPrevX = t.clientX;
            touchState.rightPrevY = t.clientY;
          }
        }
      }, { passive: false });

      function endTouch(e) {
        e.preventDefault();

        for (const t of e.changedTouches) {
          if (t.identifier === touchState.leftId) {
            touchState.leftId = null;
            touchState.moveX = 0;
            touchState.moveY = 0;
          }

          if (t.identifier === touchState.rightId) {
            touchState.rightId = null;
            touchState.lookX = 0;
            touchState.lookY = 0;
          }
        }
      }

      canvas.addEventListener("touchend", endTouch, { passive: false });
      canvas.addEventListener("touchcancel", endTouch, { passive: false });
    }

    // =========================
    // 11. カメラ更新
    // =========================
    function updateCamera() {
      const { forward, right } = getCameraBasis();

      const moveSpeed = 0.12;
      const rotateSpeed = 0.025;
      const verticalSpeed = 0.08;

      // PC: 前後移動
      if (keys["ArrowUp"]) {
        camera.position = add(camera.position, mul(forward, moveSpeed));
      }
      if (keys["ArrowDown"]) {
        camera.position = add(camera.position, mul(forward, -moveSpeed));
      }

      // PC: 左右平行移動
      if (keys["ArrowLeft"]) {
        camera.position = add(camera.position, mul(right, -moveSpeed));
      }
      if (keys["ArrowRight"]) {
        camera.position = add(camera.position, mul(right, moveSpeed));
      }

      // PC: 左右回転
      if (keys["a"] || keys["A"]) {
        camera.yaw -= rotateSpeed;
      }
      if (keys["d"] || keys["D"]) {
        camera.yaw += rotateSpeed;
      }

      // PC: 見上げ見下ろし
      if (keys["w"] || keys["W"]) {
        camera.pitch += rotateSpeed;
      }
      if (keys["s"] || keys["S"]) {
        camera.pitch -= rotateSpeed;
      }

      // PC: 上下移動
      if (keys["q"] || keys["Q"]) {
        camera.position.y += verticalSpeed;
      }
      if (keys["e"] || keys["E"]) {
        camera.position.y -= verticalSpeed;
      }

      // スマホ: 左下スティック移動
      if (touchState.leftId !== null) {
        camera.position = add(camera.position, mul(right, touchState.moveX * moveSpeed));
        camera.position = add(camera.position, mul(forward, -touchState.moveY * moveSpeed));
      }

      // スマホ: 右スワイプ視点操作
      if (touchState.rightId !== null) {
        const touchLookSpeed = 0.003;
        camera.yaw += touchState.lookX * touchLookSpeed;
        camera.pitch -= touchState.lookY * touchLookSpeed;

        touchState.lookX = 0;
        touchState.lookY = 0;
      }

      // pitch制限
      const limit = Math.PI / 2 - 0.05;
      if (camera.pitch > limit) camera.pitch = limit;
      if (camera.pitch < -limit) camera.pitch = -limit;
    }

    // =========================
    // 12. 背景・UI
    // =========================
    function drawBackground() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawDebugText() {
      ctx.fillStyle = "white";
      ctx.font = "14px sans-serif";
      ctx.fillText(
        `camera: (${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)})`,
        10,
        canvas.height - 40
      );
      ctx.fillText(
        `yaw: ${camera.yaw.toFixed(2)}   pitch: ${camera.pitch.toFixed(2)}`,
        10,
        canvas.height - 20
      );
    }

    function drawTouchUI() {
      const base = getStickBase();

      // 左下固定スティック土台（常時表示）
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(base.x, base.y, STICK_BASE_RADIUS, 0, Math.PI * 2);
      ctx.stroke();

      // 中央ガイド
      ctx.beginPath();
      ctx.arc(base.x, base.y, 8, 0, Math.PI * 2);
      ctx.stroke();

      // ノブ位置
      let knobX = base.x;
      let knobY = base.y;

      if (touchState.leftId !== null) {
        const dx = touchState.leftX - base.x;
        const dy = touchState.leftY - base.y;
        const dist = Math.hypot(dx, dy);

        let mx = dx;
        let my = dy;

        if (dist > STICK_MAX_DIST && dist > 0) {
          mx = dx * STICK_MAX_DIST / dist;
          my = dy * STICK_MAX_DIST / dist;
        }

        knobX = base.x + mx;
        knobY = base.y + my;
      }

      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.beginPath();
      ctx.arc(knobX, knobY, STICK_KNOB_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      // 右視点操作中の目印
      if (touchState.rightId !== null) {
        ctx.strokeStyle = "rgba(100,180,255,0.35)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(touchState.rightPrevX, touchState.rightPrevY, 28, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // =========================
    // 13. ループ
    // =========================
    function loop() {
      updateCamera();
      drawBackground();
      drawGroundGrid();
      drawAxes();
      drawTouchUI();
      drawDebugText();

      requestAnimationFrame(loop);
    }

    setupTouchControls();
    loop();
  </script>
</body>
</html>
