<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ground Grid</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      background: #000;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 14px;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      user-select: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">
    ↑ ↓ : 前進 / 後退<br>
    ← → : 左右平行移動<br>
    A / D : 左右回転<br>
    W / S : 見上げ / 見下ろし<br>
    Q / E : 上下移動
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function vec(x, y, z) {
      return { x, y, z };
    }

    function add(a, b) {
      return vec(a.x + b.x, a.y + b.y, a.z + b.z);
    }

    function sub(a, b) {
      return vec(a.x - b.x, a.y - b.y, a.z - b.z);
    }

    function mul(a, s) {
      return vec(a.x * s, a.y * s, a.z * s);
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y + a.z * b.z;
    }

    function cross(a, b) {
      return vec(
        a.y * b.z - a.z * b.y,
        a.z * b.x - a.x * b.z,
        a.x * b.y - a.y * b.x
      );
    }

    function length(v) {
      return Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
    }

    function normalize(v) {
      const len = length(v);
      if (len === 0) return vec(0, 0, 0);
      return vec(v.x / len, v.y / len, v.z / len);
    }

    const camera = {
      position: vec(0, 2, -8),
      yaw: 0,
      pitch: -0.25
    };

    const worldUp = vec(0, 1, 0);

    function getCameraBasis() {
      const cp = Math.cos(camera.pitch);
      const sp = Math.sin(camera.pitch);
      const cy = Math.cos(camera.yaw);
      const sy = Math.sin(camera.yaw);

      const forward = normalize(vec(
        sy * cp,
        sp,
        cy * cp
      ));

      let right = cross(forward, worldUp);

      if (length(right) < 0.0001) {
        right = vec(1, 0, 0);
      } else {
        right = normalize(right);
      }

      const up = normalize(cross(right, forward));

      return { forward, right, up };
    }

    function projectPoint(p) {
      const { forward, right, up } = getCameraBasis();
      const v = sub(p, camera.position);

      const X = dot(v, right);
      const Y = dot(v, up);
      const Z = dot(v, forward);

      if (Z <= 0.05) {
        return { visible: false };
      }

      const scale = 700;
      const screenX = canvas.width / 2 + (scale * X) / Z;
      const screenY = canvas.height / 2 - (scale * Y) / Z;

      return {
        visible: true,
        x: screenX,
        y: screenY,
        z: Z
      };
    }

    function drawLine3D(a, b, color = "white", width = 1) {
      const pa = projectPoint(a);
      const pb = projectPoint(b);

      if (!pa.visible || !pb.visible) return;

      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    function drawGroundGrid() {
      const xMin = -20;
      const xMax = 20;
      const zMin = 1;
      const zMax = 40;
      const step = 1;

      for (let x = xMin; x <= xMax; x += step) {
        const a = vec(x, 0, zMin);
        const b = vec(x, 0, zMax);
        const isMain = (x === 0);
        drawLine3D(a, b, isMain ? "#ffffff" : "#666666", isMain ? 2 : 1);
      }

      for (let z = zMin; z <= zMax; z += step) {
        const a = vec(xMin, 0, z);
        const b = vec(xMax, 0, z);
        const isMain = (z % 5 === 0);
        drawLine3D(a, b, isMain ? "#888888" : "#444444", isMain ? 1.5 : 1);
      }
    }

    function drawAxes() {
      drawLine3D(vec(0, 0, 0), vec(3, 0, 0), "red", 2);
      drawLine3D(vec(0, 0, 0), vec(0, 3, 0), "lime", 2);
      drawLine3D(vec(0, 0, 0), vec(0, 0, 3), "cyan", 2);
    }

    const keys = {};

    window.addEventListener("keydown", (e) => {
      keys[e.key] = true;
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function updateCamera() {
      const { forward, right } = getCameraBasis();

      const moveSpeed = 0.12;
      const rotateSpeed = 0.025;
      const verticalSpeed = 0.08;

      if (keys["ArrowUp"]) {
        camera.position = add(camera.position, mul(forward, moveSpeed));
      }
      if (keys["ArrowDown"]) {
        camera.position = add(camera.position, mul(forward, -moveSpeed));
      }
      if (keys["ArrowLeft"]) {
        camera.position = add(camera.position, mul(right, -moveSpeed));
      }
      if (keys["ArrowRight"]) {
        camera.position = add(camera.position, mul(right, moveSpeed));
      }
      if (keys["a"] || keys["A"]) {
        camera.yaw -= rotateSpeed;
      }
      if (keys["d"] || keys["D"]) {
        camera.yaw += rotateSpeed;
      }
      if (keys["w"] || keys["W"]) {
        camera.pitch += rotateSpeed;
      }
      if (keys["s"] || keys["S"]) {
        camera.pitch -= rotateSpeed;
      }
      if (keys["q"] || keys["Q"]) {
        camera.position.y += verticalSpeed;
      }
      if (keys["e"] || keys["E"]) {
        camera.position.y -= verticalSpeed;
      }

      const limit = Math.PI / 2 - 0.05;
      if (camera.pitch > limit) camera.pitch = limit;
      if (camera.pitch < -limit) camera.pitch = -limit;
    }

    function drawBackground() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawDebugText() {
      ctx.fillStyle = "white";
      ctx.font = "14px sans-serif";
      ctx.fillText(
        `camera: (${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)})`,
        10,
        canvas.height - 40
      );
      ctx.fillText(
        `yaw: ${camera.yaw.toFixed(2)}  pitch: ${camera.pitch.toFixed(2)}`,
        10,
        canvas.height - 20
      );
    }

    function loop() {
      updateCamera();
      drawBackground();
      drawGroundGrid();
      drawAxes();
      drawDebugText();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
